name: flowjournal
description: "FlowJournal - AI-Powered Voice Journal with Expressive Layouts"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  http: ^1.2.2
  speech_to_text: ^7.4.0
  permission_handler: ^11.3.1
  supabase_flutter: ^2.5.4
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  image_picker: ^1.0.7
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  record: ^6.0.0
  purchases_flutter: ^10.1.1
  flutter_tts: ^4.0.2
  connectivity_plus: ^6.0.3
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/bg_pure_white.png
    - assets/images/bg_slate_dark.png
    - assets/images/bg_forest_mist.png
    - assets/images/bg_sunset_glow.png
